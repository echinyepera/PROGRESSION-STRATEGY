<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>TOMATO TRAINED SECRET ODDS PROGRESSION STRATEGY</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="card">
        <div class="header-accent"></div>
        <div class="theme-picker">
            <label for="theme-color">Custom Theme Color:</label>
            <input type="color" id="theme-color" value="#6CABDD" />
        </div>
        <h1>
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 19.5L9 14.5L12 17.5L19 10.5" stroke="var(--primary-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M20 7L20 13" stroke="var(--primary-color)" stroke-width="2" stroke-linecap="round"/>
                <path d="M14 13L20 13" stroke="var(--primary-color)" stroke-width="2" stroke-linecap="round"/>
                <circle cx="4" cy="19.5" r="1.5" fill="var(--primary-color)"/>
                <circle cx="20" cy="7" r="1.5" fill="var(--primary-color)"/>
            </svg>
            TOMATO TRAINED SECRET ODDS PROGRESSION STRATEGY
        </h1>
        <div class="sub">BEST BOOKIE MILKER STRATEGY</div>

        <div class="controls">
            <div class="input-group">
                <label>
                    <span class="icon-label">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="3" y="5" width="18" height="14" rx="2" stroke="var(--primary-color)" stroke-width="1.5"/>
                            <rect x="3" y="9" width="18" height="2" fill="var(--primary-color)"/>
                            <circle cx="8" cy="12" r="1.5" fill="var(--primary-color)"/>
                            <rect x="11" y="11" width="6" height="2" rx="1" fill="var(--primary-color)"/>
                        </svg>
                    </span>
                    Starting Bankroll ($)
                </label>
                <input
                    type="number"
                    id="startBankroll"
                    value="40.00"
                    step="any"
                    min="0.01"
                    placeholder="Enter amount"
                />
            </div>
            <div class="input-group">
                <label>
                    <span class="icon-label">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="9" stroke="var(--primary-color)" stroke-width="1.5"/>
                            <path d="M12 3V12L17 12" stroke="var(--primary-color)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="12" cy="12" r="1" fill="var(--primary-color)"/>
                        </svg>
                    </span>
                    Stake (% of Bankroll)
                </label>
                <input
                    type="number"
                    id="stakePercent"
                    value="60"
                    step="1"
                    min="0"
                    max="100"
                    placeholder="0-100%"
                />
            </div>
            <div class="input-group">
                <label>
                    <span class="icon-label">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="4" y="4" width="16" height="16" rx="2" stroke="var(--primary-color)" stroke-width="1.5"/>
                            <path d="M8 8L16 16" stroke="var(--primary-color)" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M16 8L8 16" stroke="var(--primary-color)" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </span>
                    Decimal Odds (Total Return)
                </label>
                <input
                    type="number"
                    id="odds"
                    value="2.0"
                    step="0.1"
                    min="1.01"
                    placeholder="e.g., 2.0"
                />
            </div>
            <div class="input-group">
                <label>
                    <span class="icon-label">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="4" y="4" width="16" height="16" rx="2" stroke="var(--primary-color)" stroke-width="1.5"/>
                            <path d="M12 4V20" stroke="var(--primary-color)" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M4 12H20" stroke="var(--primary-color)" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </span>
                    Number of Bets (Wins Only)
                </label>
                <input
                    type="number"
                    id="numBets"
                    value="15"
                    step="1"
                    min="1"
                    max="100"
                    placeholder="1-100"
                />
            </div>
        </div>

        <div class="table-wrapper">
            <table id="progressionTable">
                <thead>
                    <tr>
                        <th>BET #</th>
                        <th>BANKROLL BEFORE ($)</th>
                        <th>STAKE ($)</th>
                        <th>PROFIT ($)</th>
                        <th>BANKROLL AFTER ($)</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="5" style="text-align: center; color: #64748b;">
                            Enter values to generate table
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="note">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display: inline-block; vertical-align: middle; margin-right: 10px;">
                <path d="M12 2L15 9L22 9L16 14L18 22L12 17L6 22L8 14L2 9L9 9L12 2Z" fill="var(--primary-color)"/>
            </svg>
            DARE TO DO THE UNTHINKABLE WITH MY SECRET WEAPON.
        </div>
    </div>

    <script>
        // DOM elements
        const startInput = document.getElementById("startBankroll");
        const stakePercentInput = document.getElementById("stakePercent");
        const oddsInput = document.getElementById("odds");
        const numBetsInput = document.getElementById("numBets");
        const tableBody = document.getElementById("tableBody");
        const themeColorInput = document.getElementById("theme-color");

        // Function to convert hex to RGB
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        // Function to get lighter and darker shades of a color
        function getShades(hex) {
            const rgb = hexToRgb(hex);
            if (!rgb) return { light: hex, dark: hex };

            // Light shade (for background)
            const lightR = Math.min(255, rgb.r + (255 - rgb.r) * 0.8);
            const lightG = Math.min(255, rgb.g + (255 - rgb.g) * 0.8);
            const lightB = Math.min(255, rgb.b + (255 - rgb.b) * 0.8);

            // Dark shade (for secondary color)
            const darkR = Math.floor(rgb.r * 0.3);
            const darkG = Math.floor(rgb.g * 0.3);
            const darkB = Math.floor(rgb.b * 0.3);

            return {
                light: `rgb(${Math.floor(lightR)}, ${Math.floor(lightG)}, ${Math.floor(lightB)})`,
                dark: `rgb(${darkR}, ${darkG}, ${darkB})`
            };
        }

        // Update theme colors
        function updateTheme(color) {
            const shades = getShades(color);
            document.documentElement.style.setProperty('--primary-color', color);
            document.documentElement.style.setProperty('--secondary-color', shades.dark);
            document.documentElement.style.setProperty('--light-bg', shades.light);
            document.documentElement.style.setProperty('--hover-bg', shades.light);
        }

        // Theme color picker event listener
        themeColorInput.addEventListener('input', (e) => {
            updateTheme(e.target.value);
        });

        // Format money
        function formatMoney(value) {
            return value.toLocaleString(undefined, {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2,
            });
        }

        // Generate table
        function generateTable() {
            // Read & parse values
            let bankroll = parseFloat(startInput.value);
            const stakePercent = parseFloat(stakePercentInput.value);
            const odds = parseFloat(oddsInput.value);
            let numBets = parseInt(numBetsInput.value, 10);

            // Validation
            if (isNaN(bankroll) || bankroll <= 0) bankroll = 0.01;
            if (isNaN(stakePercent) || stakePercent < 0) stakePercentInput.value = 0;
            if (isNaN(odds) || odds < 1.01) oddsInput.value = 2.0;
            if (isNaN(numBets) || numBets < 1) numBets = 1;

            const finalStakePercent = Math.min(100, Math.max(0, stakePercent));
            const finalOdds = Math.max(1.01, odds);

            // Clear previous
            tableBody.innerHTML = "";

            let currentBankroll = bankroll;

            for (let bet = 1; bet <= numBets; bet++) {
                const stake = currentBankroll * (finalStakePercent / 100);
                const winAmount = stake * (finalOdds - 1);
                const newBankroll = currentBankroll + winAmount;

                const row = document.createElement("tr");
                row.style.opacity = "0";
                row.style.transform = "translateY(10px)";
                row.style.transition = `all 0.3s ease ${bet * 0.03}s`;

                const betCell = document.createElement("td");
                betCell.textContent = bet;
                row.appendChild(betCell);

                const beforeCell = document.createElement("td");
                beforeCell.className = "currency";
                beforeCell.textContent = `$${formatMoney(currentBankroll)}`;
                row.appendChild(beforeCell);

                const stakeCell = document.createElement("td");
                stakeCell.className = "currency";
                stakeCell.textContent = `$${formatMoney(stake)}`;
                row.appendChild(stakeCell);

                const winCell = document.createElement("td");
                winCell.className = "currency";
                winCell.textContent = `$${formatMoney(winAmount)}`;
                row.appendChild(winCell);

                const afterCell = document.createElement("td");
                afterCell.className = "currency";
                afterCell.textContent = `$${formatMoney(newBankroll)}`;
                row.appendChild(afterCell);

                tableBody.appendChild(row);

                setTimeout(() => {
                    row.style.opacity = "1";
                    row.style.transform = "translateY(0)";
                }, 10);

                currentBankroll = newBankroll;

                if (currentBankroll <= 0) break;
            }

            if (tableBody.children.length === 0) {
                const emptyRow = document.createElement("tr");
                emptyRow.innerHTML =
                    '<td colspan="5" style="text-align:center; color: #64748b;">Invalid inputs – adjust values</td>';
                tableBody.appendChild(emptyRow);
            }
        }

        // Attach event listeners
        startInput.addEventListener("input", generateTable);
        stakePercentInput.addEventListener("input", generateTable);
        oddsInput.addEventListener("input", generateTable);
        numBetsInput.addEventListener("input", generateTable);

        // Initial render
        generateTable();
    </script>
</body>
</html>
